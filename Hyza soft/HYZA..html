<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYZA SOFT · Sistema de Gestão</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-color: #fdf8f0; /* creme */
            min-height: 100vh;
            position: relative;
            padding: 20px;
        }

        /* Marca d'água HYZA-SOFT na vertical */
        body::after {
            content: "HYZA-SOFT HYZA-SOFT HYZA-SOFT HYZA-SOFT HYZA-SOFT HYZA-SOFT";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            writing-mode: vertical-rl;
            text-orientation: upright;
            font-size: 4rem;
            font-weight: bold;
            color: rgba(25, 40, 70, 0.1);
            white-space: nowrap;
            transform: rotate(180deg);
            pointer-events: none;
            z-index: 0;
            font-family: 'Courier New', monospace;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            background-color: rgba(255, 250, 240, 0.9);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 2px solid #1f2c48;
        }

        /* Cabeçalho com logo I e HYZA SOFT */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            border-bottom: 3px solid #1f2c48;
            padding-bottom: 15px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .logo-icon {
            background-color: #1f2c48;
            color: #fdf8f0;
            width: 80px;
            height: 80px;
            border-radius: 20px 5px 20px 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            font-weight: bold;
            box-shadow: 5px 5px 0 #99a8c9;
            line-height: 1;
        }

        .logo-text {
            display: flex;
            flex-direction: column;
            margin-left: 0px;
        }

        .logo-text .hyza {
            font-size: 2.5rem;
            font-weight: bold;
            color: #1f2c48;
            letter-spacing: 2px;
        }

        .logo-text .soft {
            font-size: 1.8rem;
            font-weight: normal;
            color: #4a5b7c;
            margin-top: -8px;
        }

        .versao {
            background-color: #1f2c48;
            color: #fdf8f0;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 0.9rem;
        }

        /* Barra de pesquisa */
        .search-box {
            display: flex;
            margin-bottom: 30px;
            border: 2px solid #1f2c48;
            border-radius: 50px;
            overflow: hidden;
            background: white;
        }

        .search-box input {
            flex: 1;
            padding: 15px 20px;
            border: none;
            outline: none;
            font-size: 1rem;
        }

        .search-box button {
            background-color: #1f2c48;
            color: white;
            border: none;
            padding: 0 30px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: 0.3s;
        }

        .search-box button:hover {
            background-color: #2f4070;
        }

        /* Grid de 2 colunas */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 25px;
            margin-bottom: 30px;
        }

        /* Formulário de registro */
        .form-card {
            background-color: #fff9f0;
            border: 2px solid #1f2c48;
            border-radius: 20px 5px 20px 5px;
            padding: 25px;
            box-shadow: 8px 8px 0 #c5cfdf;
        }

        .form-card h2 {
            color: #1f2c48;
            margin-bottom: 20px;
            border-left: 8px solid #1f2c48;
            padding-left: 15px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            color: #1f2c48;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .form-group input, .form-group select {
            padding: 12px;
            border: 2px solid #1f2c48;
            border-radius: 15px;
            outline: none;
            background: white;
        }

        .btn-add {
            background-color: #1f2c48;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        .btn-add:hover {
            background-color: #2f4070;
            transform: translateY(-2px);
            box-shadow: 0 5px 0 #0f1a2c;
        }

        /* Card de contato e admin */
        .contato-card {
            background-color: #fff9f0;
            border: 2px solid #1f2c48;
            border-radius: 20px 5px 20px 5px;
            padding: 25px;
            box-shadow: 8px 8px 0 #c5cfdf;
        }

        .contato-card h3 {
            color: #1f2c48;
            margin-bottom: 20px;
            border-bottom: 2px dotted #1f2c48;
            padding-bottom: 10px;
        }

        .contato-item {
            display: flex;
            align-items: center;
            gap: 15px;
            background-color: #efe8dc;
            padding: 12px 15px;
            border-radius: 50px;
            margin-bottom: 15px;
            border: 1px solid #1f2c48;
        }

        .contato-item i {
            color: #1f2c48;
            font-size: 1.2rem;
            width: 25px;
        }

        .contato-item a {
            color: #1f2c48;
            text-decoration: none;
            font-weight: 500;
        }

        /* Área de login admin */
        .admin-login {
            background-color: #efe8dc;
            border-radius: 15px 5px 15px 5px;
            border: 2px solid #1f2c48;
            padding: 20px;
            margin: 20px 0;
        }

        .admin-login h4 {
            color: #1f2c48;
            margin-bottom: 15px;
        }

        .admin-login input {
            width: 100%;
            padding: 12px;
            border: 2px solid #1f2c48;
            border-radius: 30px;
            margin-bottom: 10px;
            outline: none;
        }

        .btn-admin {
            background-color: #1f2c48;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 30px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
        }

        .admin-panel {
            background-color: #efe8dc;
            border-radius: 15px 5px 15px 5px;
            border: 2px solid #1f2c48;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }

        .admin-panel.visible {
            display: block;
        }

        .reclamacoes-list {
            background: white;
            border-radius: 10px;
            padding: 10px;
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 10px;
        }

        .reclamacao-item {
            background-color: #fdf8f0;
            border-left: 5px solid #1f2c48;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
        }

        .reclamacao-item small {
            color: #666;
            display: block;
            margin-top: 5px;
        }

        .btn-sair {
            background-color: #a0a9bc;
            color: #1f2c48;
            border: none;
            padding: 10px;
            border-radius: 30px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
        }

        /* Caixa de reclamação pública */
        .reclamacao-box {
            background-color: #efe8dc;
            border-radius: 15px 5px 15px 5px;
            border: 2px solid #1f2c48;
            padding: 20px;
        }

        .reclamacao-box textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #1f2c48;
            border-radius: 15px;
            margin: 10px 0;
            resize: vertical;
            outline: none;
        }

        .btn-reclamar {
            background-color: #1f2c48;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
        }

        .feedback-msg {
            margin-top: 10px;
            color: #1f2c48;
            font-style: italic;
        }

        /* Tabela de registros */
        .tabela-card {
            background-color: #fff9f0;
            border: 2px solid #1f2c48;
            border-radius: 20px 5px 20px 5px;
            overflow: hidden;
            margin-top: 30px;
        }

        .tabela-header {
            background-color: #1f2c48;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .contador {
            background-color: #fdf8f0;
            color: #1f2c48;
            padding: 5px 15px;
            border-radius: 30px;
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background-color: #e5decf;
            color: #1f2c48;
            padding: 15px;
            text-align: left;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #ccc;
        }

        .btn-remover {
            background: transparent;
            border: 2px solid #1f2c48;
            border-radius: 30px;
            padding: 5px 15px;
            color: #1f2c48;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-remover:hover {
            background-color: #1f2c48;
            color: white;
        }

        .badge {
            background-color: #1f2c48;
            color: white;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 0.9rem;
        }

        .footer {
            margin-top: 30px;
            text-align: center;
            color: #1f2c48;
            border-top: 2px dashed #1f2c48;
            padding-top: 20px;
        }

        .vazio {
            text-align: center;
            padding: 40px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header com logo: I maiúsculo + HYZA SOFT (HYZA maior, SOFT menor) -->
        <div class="header">
            <div class="logo">
                <div class="logo-icon">I</div>
                <div class="logo-text">
                    <div class="hyza">HYZA</div>
                    <div class="soft">SOFT</div>
                </div>
            </div>
            <div class="versao">v2.0</div>
        </div>

        <!-- Busca -->
        <div class="search-box">
            <input type="text" id="campoBusca" placeholder="Buscar por data, produto, lote ou nome...">
            <button id="btnBuscar"><i class="fas fa-search"></i> Buscar</button>
        </div>

        <!-- Grid principal -->
        <div class="grid-2">
            <!-- Formulário de registro -->
            <div class="form-card">
                <h2><i class="fas fa-plus-circle"></i> Novo Registro</h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label>DATA</label>
                        <input type="date" id="data" value="2026-03-06">
                    </div>
                    <div class="form-group">
                        <label>PRODUTO</label>
                        <input type="text" id="produto" placeholder="Nome do produto">
                    </div>
                    <div class="form-group">
                        <label>LOTE</label>
                        <input type="text" id="lote" placeholder="Nº do lote">
                    </div>
                    <div class="form-group">
                        <label>NOME</label>
                        <input type="text" id="nome" placeholder="Responsável">
                    </div>
                    <div class="form-group">
                        <label>DEVOLUÇÃO</label>
                        <select id="devolucao">
                            <option value="nao">Não</option>
                            <option value="sim">Sim</option>
                        </select>
                    </div>
                </div>
                <button class="btn-add" id="btnAdicionar">
                    <i class="fas fa-save"></i> ADICIONAR
                </button>
            </div>

            <!-- Contato e Admin -->
            <div class="contato-card">
                <h3><i class="fas fa-headset"></i> Atendimento</h3>
                
                <!-- Contatos -->
                <div class="contato-item">
                    <i class="fas fa-phone-alt"></i>
                    <a href="tel:+5543988718805">(43) 98871-8805</a>
                </div>
                <div class="contato-item">
                    <i class="fas fa-envelope"></i>
                    <a href="mailto:hyza.eng@gmail.com">hyza.eng@gmail.com</a>
                </div>

                <!-- Login Admin - SENHA: 283090 -->
                <div class="admin-login">
                    <h4><i class="fas fa-lock"></i> Área Restrita</h4>
                    <input type="password" id="senhaAdmin" placeholder="Digite a senha">
                    <button class="btn-admin" id="btnLogin">
                        <i class="fas fa-sign-in-alt"></i> Entrar
                    </button>
                    <div id="loginMsg" style="margin-top: 10px; color: #1f2c48;"></div>
                </div>

                <!-- Painel Admin (inicialmente oculto) -->
                <div class="admin-panel" id="painelAdmin">
                    <h4><i class="fas fa-comments"></i> Reclamações</h4>
                    <div class="reclamacoes-list" id="listaReclamacoes"></div>
                    <button class="btn-sair" id="btnSair">
                        <i class="fas fa-sign-out-alt"></i> Sair
                    </button>
                </div>

                <!-- Caixa de reclamação pública -->
                <div class="reclamacao-box">
                    <label><i class="fas fa-comment-dots"></i> Canal de Reclamações</label>
                    <textarea id="textoReclamacao" rows="3" placeholder="Digite sua reclamação..."></textarea>
                    <button class="btn-reclamar" id="btnReclamar">
                        <i class="fas fa-paper-plane"></i> Enviar
                    </button>
                    <div class="feedback-msg" id="reclamacaoMsg"></div>
                </div>
            </div>
        </div>

        <!-- Tabela de Registros -->
        <div class="tabela-card">
            <div class="tabela-header">
                <h2><i class="fas fa-clipboard-list"></i> Registros Ativos</h2>
                <span class="contador" id="contador">0</span>
            </div>
            <div style="overflow-x: auto;">
                <table id="tabela">
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>Produto</th>
                            <th>Lote</th>
                            <th>Nome</th>
                            <th>Devolução</th>
                            <th>Ação</th>
                        </tr>
                    </thead>
                    <tbody id="corpoTabela"></tbody>
                </table>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <i class="fas fa-phone-alt"></i> (43) 98871-8805 &nbsp;&nbsp; 
            <i class="fas fa-envelope"></i> hyza.eng@gmail.com &nbsp;&nbsp; 
            I HYZA SOFT © 2026
        </div>
    </div>

    <script>
        // FUNÇÃO PRINCIPAL QUE INICIALIZA TUDO
        (function() {
            console.log("Iniciando HYZA SOFT...");

            // ========== CONFIGURAÇÕES ==========
            const ADMIN_SENHA = '283090';
            
            // ========== DADOS ==========
            let registros = [];
            let reclamacoes = [];

            // ========== CARREGAR DADOS DO LOCALSTORAGE ==========
            function carregarDados() {
                // Carregar registros
                try {
                    const regSalvos = localStorage.getItem('hyza_registros');
                    if (regSalvos) {
                        registros = JSON.parse(regSalvos);
                    } else {
                        // Dados iniciais
                        registros = [
                            { id: '1', data: '2026-03-06', produto: 'Notebook Dell', lote: 'LT-5532', nome: 'Distribuidora A' },
                            { id: '2', data: '2026-03-05', produto: 'Mouse Sem Fio', lote: 'LT-987A', nome: 'TechBlue' },
                            { id: '3', data: '2026-03-04', produto: 'Teclado Mecânico', lote: 'KB-777', nome: 'KeyStore' }
                        ];
                    }
                } catch (e) {
                    registros = [];
                }

                // Carregar reclamações
                try {
                    const recSalvos = localStorage.getItem('hyza_reclamacoes');
                    if (recSalvos) {
                        reclamacoes = JSON.parse(recSalvos);
                    } else {
                        reclamacoes = [
                            { id: 'r1', texto: 'Produto veio com defeito', data: '05/03/2026' },
                            { id: 'r2', texto: 'Atraso na entrega', data: '04/03/2026' }
                        ];
                    }
                } catch (e) {
                    reclamacoes = [];
                }
            }

            // ========== SALVAR DADOS ==========
            function salvarRegistros() {
                localStorage.setItem('hyza_registros', JSON.stringify(registros));
            }

            function salvarReclamacoes() {
                localStorage.setItem('hyza_reclamacoes', JSON.stringify(reclamacoes));
            }

            // ========== ORDENAR POR DATA ==========
            function ordenarRegistros() {
                registros.sort((a, b) => (a.data > b.data ? -1 : 1));
            }

            // ========== RENDERIZAR TABELA ==========
            function renderizarTabela() {
                const tbody = document.getElementById('corpoTabela');
                const contador = document.getElementById('contador');
                
                if (!tbody) return;

                if (registros.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="vazio">Nenhum registro encontrado</td></tr>';
                    if (contador) contador.textContent = '0';
                    return;
                }

                let html = '';
                registros.forEach(item => {
                    html += `
                        <tr>
                            <td><strong>${item.data}</strong></td>
                            <td>${item.produto || '-'}</td>
                            <td>${item.lote || '-'}</td>
                            <td>${item.nome || '-'}</td>
                            <td><span class="badge">Não</span></td>
                            <td>
                                <button class="btn-remover" onclick="removerRegistro('${item.id}')">
                                    <i class="fas fa-trash"></i> Remover
                                </button>
                            </td>
                        </tr>
                    `;
                });

                tbody.innerHTML = html;
                if (contador) contador.textContent = registros.length;
            }

            // ========== REMOVER REGISTRO ==========
            window.removerRegistro = function(id) {
                registros = registros.filter(r => r.id !== id);
                salvarRegistros();
                renderizarTabela();
            };

            // ========== ADICIONAR REGISTRO ==========
            function adicionarRegistro() {
                const data = document.getElementById('data').value;
                const produto = document.getElementById('produto').value.trim();
                const lote = document.getElementById('lote').value.trim();
                const nome = document.getElementById('nome').value.trim();
                const devolucao = document.getElementById('devolucao').value;

                // Validação
                if (!data || !produto) {
                    alert('Preencha DATA e PRODUTO!');
                    return;
                }

                // Se for devolução = sim, não adiciona
                if (devolucao === 'sim') {
                    alert('Item com devolução NÃO foi adicionado!');
                    document.getElementById('produto').value = '';
                    document.getElementById('lote').value = '';
                    document.getElementById('nome').value = '';
                    return;
                }

                // Criar novo registro
                const novoRegistro = {
                    id: Date.now() + '-' + Math.random().toString(36).substr(2, 9),
                    data: data,
                    produto: produto,
                    lote: lote || 'Sem lote',
                    nome: nome || 'Sem nome'
                };

                registros.push(novoRegistro);
                ordenarRegistros();
                salvarRegistros();
                renderizarTabela();

                // Limpar campos
                document.getElementById('produto').value = '';
                document.getElementById('lote').value = '';
                document.getElementById('nome').value = '';
                document.getElementById('devolucao').value = 'nao';

                alert('Registro adicionado com sucesso!');
            }

            // ========== PESQUISAR ==========
            function pesquisar() {
                const termo = document.getElementById('campoBusca').value.toLowerCase().trim();
                
                if (!termo) {
                    renderizarTabela();
                    return;
                }

                const filtrados = registros.filter(item => 
                    item.data.includes(termo) || 
                    item.produto.toLowerCase().includes(termo) ||
                    (item.lote && item.lote.toLowerCase().includes(termo)) ||
                    (item.nome && item.nome.toLowerCase().includes(termo))
                );

                // Renderizar filtrados
                const tbody = document.getElementById('corpoTabela');
                if (filtrados.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="vazio">Nenhum resultado encontrado</td></tr>';
                    document.getElementById('contador').textContent = registros.length;
                } else {
                    let html = '';
                    filtrados.forEach(item => {
                        html += `
                            <tr>
                                <td><strong>${item.data}</strong></td>
                                <td>${item.produto}</td>
                                <td>${item.lote || '-'}</td>
                                <td>${item.nome || '-'}</td>
                                <td><span class="badge">Não</span></td>
                                <td>
                                    <button class="btn-remover" onclick="removerRegistro('${item.id}')">
                                        <i class="fas fa-trash"></i> Remover
                                    </button>
                                </td>
                            </tr>
                        `;
                    });
                    tbody.innerHTML = html;
                    document.getElementById('contador').textContent = registros.length;
                }
            }

            // ========== ATUALIZAR LISTA DE RECLAMAÇÕES ==========
            function atualizarReclamacoes() {
                const lista = document.getElementById('listaReclamacoes');
                if (!lista) return;

                if (reclamacoes.length === 0) {
                    lista.innerHTML = '<p style="text-align:center; color:#666;">Nenhuma reclamação</p>';
                    return;
                }

                let html = '';
                reclamacoes.slice().reverse().forEach(rec => {
                    html += `
                        <div class="reclamacao-item">
                            <strong>📢 Reclamação</strong><br>
                            ${rec.texto}<br>
                            <small>${rec.data}</small>
                        </div>
                    `;
                });
                lista.innerHTML = html;
            }

            // ========== LOGIN ADMIN ==========
            document.getElementById('btnLogin').addEventListener('click', function() {
                const senha = document.getElementById('senhaAdmin').value;
                const msg = document.getElementById('loginMsg');

                if (senha === ADMIN_SENHA) {
                    document.getElementById('painelAdmin').classList.add('visible');
                    msg.innerHTML = '✅ Login efetuado!';
                    atualizarReclamacoes();
                } else {
                    msg.innerHTML = '❌ Senha incorreta!';
                }
            });

            // ========== SAIR ADMIN ==========
            document.getElementById('btnSair').addEventListener('click', function() {
                document.getElementById('painelAdmin').classList.remove('visible');
                document.getElementById('senhaAdmin').value = '';
                document.getElementById('loginMsg').innerHTML = '';
            });

            // ========== ENVIAR RECLAMAÇÃO ==========
            document.getElementById('btnReclamar').addEventListener('click', function() {
                const texto = document.getElementById('textoReclamacao').value.trim();
                const msg = document.getElementById('reclamacaoMsg');

                if (!texto) {
                    msg.innerHTML = '⚠️ Digite sua reclamação!';
                    return;
                }

                const novaReclamacao = {
                    id: Date.now() + '-' + Math.random().toString(36).substr(2, 9),
                    texto: texto,
                    data: new Date().toLocaleDateString('pt-BR')
                };

                reclamacoes.push(novaReclamacao);
                salvarReclamacoes();

                document.getElementById('textoReclamacao').value = '';
                msg.innerHTML = '✅ Reclamação enviada!';

                if (document.getElementById('painelAdmin').classList.contains('visible')) {
                    atualizarReclamacoes();
                }

                setTimeout(() => { msg.innerHTML = ''; }, 3000);
            });

            // ========== EVENT LISTENERS ==========
            document.getElementById('btnAdicionar').addEventListener('click', adicionarRegistro);
            document.getElementById('btnBuscar').addEventListener('click', pesquisar);
            
            document.getElementById('campoBusca').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') pesquisar();
            });

            // ========== INICIALIZAR ==========
            carregarDados();
            ordenarRegistros();
            renderizarTabela();

            console.log("Site funcionando!", registros);
        })();
    </script>
</body>
</html>
