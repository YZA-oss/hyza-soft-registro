<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYZA-SOFT · Gestão profissional</title>
    <!-- Font Awesome 6 (gratuito) para ícones modernos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #faf6ef;  /* creme suave */
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1.5rem;
        }

        /* watermark vertical mais elegante, menos intrusivo */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: repeating-linear-gradient(90deg, 
                transparent 0px, 
                transparent 50px, 
                rgba(25, 45, 80, 0.025) 50px, 
                rgba(25, 45, 80, 0.025) 52px);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: "HYZA-SOFT  HYZA-SOFT  HYZA-SOFT  HYZA-SOFT  HYZA-SOFT  HYZA-SOFT  HYZA-SOFT  HYZA-SOFT";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            writing-mode: vertical-rl;
            text-orientation: upright;
            font-size: 5rem;
            font-weight: 600;
            letter-spacing: 18px;
            color: rgba(20, 35, 65, 0.04);
            white-space: nowrap;
            transform: rotate(180deg);
            line-height: 1.2;
            pointer-events: none;
            z-index: 0;
            font-family: 'Montserrat', 'Courier New', monospace;
            text-transform: uppercase;
        }

        .main-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1300px;
            background: rgba(255, 251, 242, 0.92);
            backdrop-filter: blur(3px);
            border-radius: 2rem 1rem 2rem 1rem;
            box-shadow: 0 25px 45px -18px #0b1a2f, 0 0 0 1px rgba(25, 45, 80, 0.2);
            padding: 2rem 2.2rem;
            border: 1px solid #dce3ed;
        }

        /* cabeçalho refinado */
        .top-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            border-bottom: 2px solid #1f2c48;
            padding-bottom: 1rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-icon {
            background: #1f2c48;
            width: 48px;
            height: 48px;
            border-radius: 16px 4px 16px 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff3e0;
            font-size: 1.8rem;
            font-weight: 600;
            box-shadow: 4px 4px 0 #b9c2d4;
        }

        .logo-text h1 {
            font-size: 2.2rem;
            font-weight: 500;
            letter-spacing: 1px;
            color: #1f2c48;
            line-height: 1.1;
        }

        .logo-text span {
            font-size: 0.8rem;
            color: #3d5075;
            background: #e6decf;
            padding: 0.2rem 1rem;
            border-radius: 30px;
        }

        .badge-sistema {
            background: #1f2c48;
            color: #faf3e4;
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.9rem;
            border: 1px solid #fffbf0;
            box-shadow: inset 0 1px 3px #ffffff50;
        }

        /* pesquisa refinada */
        .search-section {
            margin-bottom: 2.5rem;
        }

        .search-container {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 60px;
            border: 2px solid #1f2c48;
            padding: 0.2rem 0.2rem 0.2rem 1.8rem;
            transition: box-shadow 0.2s;
        }

        .search-container:focus-within {
            box-shadow: 0 0 0 4px rgba(31, 44, 72, 0.15);
        }

        .search-container i {
            color: #1f2c48;
            font-size: 1.2rem;
            opacity: 0.7;
        }

        .search-container input {
            flex: 1;
            border: none;
            padding: 1rem 0.8rem;
            font-size: 1.1rem;
            background: transparent;
            outline: none;
            color: #1a263b;
        }

        .search-container button {
            background: #1f2c48;
            border: none;
            border-radius: 50px;
            padding: 0.8rem 2.2rem;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
            border: 2px solid #1f2c48;
            letter-spacing: 0.3px;
        }

        .search-container button:hover {
            background: #263b60;
            transform: scale(1.02);
        }

        /* grid dois painéis: formulário + contatos laterais (visual clean) */
        .painel-dois {
            display: grid;
            grid-template-columns: 1fr 280px;
            gap: 2rem;
            margin-bottom: 2.5rem;
        }

        /* formulário com cartão elegante */
        .form-card {
            background: rgba(255, 250, 240, 0.7);
            border: 2px solid #1f2c48;
            border-radius: 1.8rem 0.3rem 1.8rem 0.3rem;
            padding: 1.8rem 1.8rem 2rem;
            box-shadow: 12px 12px 0 #d1d9e8;
        }

        .form-card h2 {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #1f2c48;
            font-weight: 450;
            font-size: 1.8rem;
            margin-bottom: 1.8rem;
            border-left: 10px solid #1f2c48;
            padding-left: 1rem;
        }

        .campos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .campo {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .campo label {
            font-weight: 600;
            color: #1f2c48;
            font-size: 0.85rem;
            letter-spacing: 0.4px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .campo input, .campo select {
            background: white;
            border: 2px solid #1f2c48;
            border-radius: 18px;
            padding: 0.8rem 1.2rem;
            font-size: 0.95rem;
            outline: none;
            transition: 0.15s;
            color: #131e30;
        }

        .campo input:focus, .campo select:focus {
            border-color: #2f4570;
            box-shadow: 0 0 0 3px rgba(31, 44, 72, 0.15);
        }

        .btn-adicionar {
            background: #1f2c48;
            border: none;
            padding: 1rem 1.5rem;
            border-radius: 50px;
            color: #fef6e8;
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            cursor: pointer;
            width: 100%;
            border: 2px solid #1f2c48;
            transition: all 0.2s;
        }

        .btn-adicionar:hover {
            background: #2c3f64;
            box-shadow: 0 6px 0 #0f1a2a;
            transform: translateY(-2px);
        }

        /* bloco de contato / reclamações (mais profissional) */
        .contato-card {
            background: #ffffffd9;
            border: 2px solid #1f2c48;
            border-radius: 1.8rem 0.3rem 1.8rem 0.3rem;
            padding: 1.8rem 1.5rem;
            box-shadow: 8px 8px 0 #ced6e6;
            display: flex;
            flex-direction: column;
        }

        .contato-card h3 {
            color: #1f2c48;
            font-weight: 500;
            font-size: 1.6rem;
            border-bottom: 3px dotted #1f2c48;
            padding-bottom: 0.6rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .info-contato {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin-bottom: 1.8rem;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: #f4efe7;
            padding: 0.9rem 1rem;
            border-radius: 50px;
            border: 1px solid #b7c1d4;
            color: #1f2c48;
            font-weight: 500;
        }

        .info-item i {
            font-size: 1.3rem;
            width: 28px;
            color: #1f2c48;
        }

        .info-item a {
            text-decoration: none;
            color: #1f2c48;
            word-break: break-all;
        }

        .info-item a:hover {
            text-decoration: underline;
        }

        /* caixa de reclamação (estilo field) */
        .reclamacao-box {
            background: #f2e9db;
            border-radius: 30px 8px 30px 8px;
            border: 2px solid #1f2c48;
            padding: 1.2rem;
            margin-top: 0.5rem;
        }

        .reclamacao-box label {
            font-weight: 600;
            color: #1f2c48;
            display: block;
            margin-bottom: 0.5rem;
            font-size: 1rem;
        }

        .reclamacao-box textarea {
            width: 100%;
            border: 2px solid #1f2c48;
            border-radius: 20px;
            padding: 1rem;
            font-size: 0.95rem;
            resize: vertical;
            background: white;
            margin-bottom: 1rem;
        }

        .reclamacao-box button {
            background: #1f2c48;
            color: white;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
            border: 2px solid #1f2c48;
            width: fit-content;
        }

        .reclamacao-box button:hover {
            background: #2c3f64;
        }

        .feedback-msg {
            font-size: 0.85rem;
            margin-top: 0.3rem;
            color: #1f2c48;
            font-style: italic;
        }

        /* lista de registros profissional */
        .registros-wrapper {
            margin-top: 1.5rem;
            border-radius: 1.8rem 0.3rem 1.8rem 0.3rem;
            border: 2px solid #1f2c48;
            overflow: hidden;
            background: white;
        }

        .registros-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1f2c48;
            padding: 1rem 1.5rem;
            color: #fff8e7;
        }

        .registros-header h2 {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .contador {
            background: #f5e7d4;
            color: #1f2c48;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            font-weight: 600;
        }

        .tabela-responsiva {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 700px;
        }

        th {
            background: #ece5d9;
            color: #1f2c48;
            font-weight: 600;
            padding: 1rem 1rem;
            text-align: left;
            font-size: 0.9rem;
        }

        td {
            padding: 1rem 1rem;
            border-bottom: 1px solid #ccd3e2;
            color: #1e2a3a;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .badge-devolucao {
            background: #1f2c48;
            color: #fff3e2;
            padding: 0.25rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .btn-remover {
            background: transparent;
            border: 2px solid #1f2c48;
            border-radius: 30px;
            padding: 0.3rem 1.2rem;
            color: #1f2c48;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-remover:hover {
            background: #1f2c48;
            color: white;
        }

        /* rodapé com email e telefone (reforço) */
        .footer-profissional {
            margin-top: 2.2rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            border-top: 2px dashed #1f2c48;
            padding-top: 1.2rem;
            color: #1f2c48;
        }

        .footer-contato i {
            margin-right: 6px;
        }

        .footer-contato span {
            margin-right: 2rem;
        }

        /* responsividade */
        @media (max-width: 900px) {
            .painel-dois {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="main-card">
        <!-- cabeçalho profissional -->
        <div class="top-bar">
            <div class="logo-area">
                <div class="logo-icon">H</div>
                <div class="logo-text">
                    <h1>HYZA·SOFT</h1>
                    <span>gestão inteligente</span>
                </div>
            </div>
            <div class="badge-sistema">
                <i class="fas fa-shield-alt" style="margin-right: 6px;"></i>controle v1.0
            </div>
        </div>

        <!-- barra de pesquisa -->
        <div class="search-section">
            <div class="search-container">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Buscar por data, produto, lote ou nome...">
                <button id="searchBtn"><i class="fas fa-filter"></i> Filtrar</button>
            </div>
        </div>

        <!-- área principal com dois painéis: form + contato/reclamação -->
        <div class="painel-dois">
            <!-- coluna esquerda: formulário de adição -->
            <div class="form-card">
                <h2><i class="fas fa-plus-circle"></i> Novo registro</h2>
                <div class="campos-grid">
                    <div class="campo">
                        <label><i class="far fa-calendar-alt"></i> DATA</label>
                        <input type="date" id="campoData" value="2026-03-06">
                    </div>
                    <div class="campo">
                        <label><i class="fas fa-box"></i> PRODUTO</label>
                        <input type="text" id="campoProduto" placeholder="ex: Notebook">
                    </div>
                    <div class="campo">
                        <label><i class="fas fa-barcode"></i> LOTE</label>
                        <input type="text" id="campoLote" placeholder="Lote A1">
                    </div>
                    <div class="campo">
                        <label><i class="fas fa-user"></i> NOME</label>
                        <input type="text" id="campoNome" placeholder="responsável">
                    </div>
                    <div class="campo">
                        <label><i class="fas fa-undo-alt"></i> DEVOLUÇÃO</label>
                        <select id="campoDevolucao">
                            <option value="não">⛔ Não</option>
                            <option value="sim">🔁 Sim (devolver)</option>
                        </select>
                    </div>
                </div>
                <button class="btn-adicionar" id="btnAdicionar"><i class="fas fa-save"></i> ADICIONAR INFORMAÇÃO</button>
            </div>

            <!-- coluna direita: contato profissional e caixa de reclamação -->
            <div class="contato-card">
                <h3><i class="fas fa-headset"></i> Atendimento</h3>
                <div class="info-contato">
                    <div class="info-item">
                        <i class="fas fa-envelope"></i>
                        <a href="mailto:contato@hyzasoft.com">contato@hyzasoft.com</a>
                    </div>
                    <div class="info-item">
                        <i class="fas fa-phone-alt"></i>
                        <a href="tel:+5511999999999">(11) 9 9999-9999</a>
                    </div>
                </div>

                <!-- caixa de reclamação / feedback -->
                <div class="reclamacao-box">
                    <label for="reclamacaoText"><i class="fas fa-comment-dots"></i> Canal de reclamações</label>
                    <textarea id="reclamacaoText" rows="2" placeholder="Digite sua mensagem..."></textarea>
                    <button id="btnReclamar"><i class="fas fa-paper-plane"></i> Enviar</button>
                    <div class="feedback-msg" id="feedbackReclamacao"></div>
                </div>
                <p style="font-size:0.75rem; margin-top:0.5rem; color:#2a3b5a;"><i class="far fa-clock"></i> Respondemos em até 24h</p>
            </div>
        </div>

        <!-- lista de registros -->
        <div class="registros-wrapper">
            <div class="registros-header">
                <h2><i class="fas fa-clipboard-list"></i> Registros ativos</h2>
                <span class="contador" id="contadorRegistros">0</span>
            </div>
            <div class="tabela-responsiva">
                <table id="tabelaRegistros">
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>Produto</th>
                            <th>Lote</th>
                            <th>Nome</th>
                            <th>Devolução</th>
                            <th>Ação</th>
                        </tr>
                    </thead>
                    <tbody id="tbodyRegistros"></tbody>
                </table>
            </div>
        </div>

        <!-- rodapé com contato direto (reforço) -->
        <div class="footer-profissional">
            <div class="footer-contato">
                <i class="fas fa-envelope"></i> <span>contato@hyzasoft.com</span>
                <i class="fas fa-phone-alt"></i> <span>(11) 99999-9999</span>
            </div>
            <div>HYZA-SOFT © 2026 · gestão profissional</div>
        </div>
    </div>

    <script>
        (function() {
            // ---------- localStorage e dados ----------
            const STORAGE_KEY = 'hyza_profissional';
            let registros = [];

            function carregarRegistros() {
                try {
                    const salvos = localStorage.getItem(STORAGE_KEY);
                    if (salvos) {
                        registros = JSON.parse(salvos);
                    } else {
                        registros = [
                            { id: 'd1', data: '2026-03-06', produto: 'Notebook Dell', lote: 'LT-5532', nome: 'Distribuidora A', devolucao: 'não' },
                            { id: 'd2', data: '2026-03-05', produto: 'Mouse Sem fio', lote: 'LT-987A', nome: 'TechBlue', devolucao: 'não' },
                            { id: 'd3', data: '2026-03-04', produto: 'Teclado Mecânico', lote: 'KB-777', nome: 'KeyStore', devolucao: 'não' },
                        ];
                    }
                } catch (e) {
                    registros = [];
                }
                // excluir qualquer 'sim' persistido (segurança)
                registros = registros.filter(item => item.devolucao !== 'sim');
                ordenarPorData();
                salvar();
            }

            function ordenarPorData() {
                registros.sort((a, b) => (a.data > b.data ? -1 : a.data < b.data ? 1 : 0));
            }

            function salvar() {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(registros));
            }

            function atualizarContador() {
                const cont = document.getElementById('contadorRegistros');
                if (cont) cont.innerText = registros.length;
            }

            function renderizarTabela(itens = registros) {
                const tbody = document.getElementById('tbodyRegistros');
                if (!tbody) return;

                const ativos = itens.filter(r => r.devolucao !== 'sim');
                if (ativos.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:2.5rem; color:#3f4e6b;">📭 Nenhum registro ativo. Adicione novos itens.</td></tr>`;
                } else {
                    let html = '';
                    ativos.forEach(item => {
                        html += `<tr>
                            <td><strong>${item.data}</strong></td>
                            <td>${item.produto || '—'}</td>
                            <td>${item.lote || '—'}</td>
                            <td>${item.nome || '—'}</td>
                            <td><span class="badge-devolucao">⛔ não</span></td>
                            <td><button class="btn-remover" data-id="${item.id}"><i class="fas fa-trash-alt"></i> remover</button></td>
                        </tr>`;
                    });
                    tbody.innerHTML = html;
                }

                // eventos remover
                document.querySelectorAll('.btn-remover').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const id = e.currentTarget.getAttribute('data-id');
                        registros = registros.filter(r => r.id !== id);
                        ordenarPorData();
                        salvar();
                        renderizarTabela();
                        atualizarContador();
                    });
                });
                atualizarContador();
            }

            function gerarId() {
                return Date.now() + '-' + Math.random().toString(36).substring(2, 12);
            }

            function adicionarRegistro() {
                const data = document.getElementById('campoData').value.trim();
                const produto = document.getElementById('campoProduto').value.trim();
                const lote = document.getElementById('campoLote').value.trim();
                const nome = document.getElementById('campoNome').value.trim();
                const devolucao = document.getElementById('campoDevolucao').value;

                if (!data || !produto) {
                    alert('Por favor, preencha DATA e PRODUTO.');
                    return;
                }

                if (devolucao === 'sim') {
                    alert('✅ Item com devolução não foi salvo (removido automaticamente).');
                    // limpa só produto/nome/lote (opcional)
                    document.getElementById('campoProduto').value = '';
                    document.getElementById('campoLote').value = '';
                    document.getElementById('campoNome').value = '';
                    document.getElementById('campoDevolucao').value = 'não';
                    return;
                }

                const novo = {
                    id: gerarId(),
                    data: data,
                    produto: produto || '(sem produto)',
                    lote: lote || '(sem lote)',
                    nome: nome || '(sem nome)',
                    devolucao: 'não'
                };

                registros.push(novo);
                ordenarPorData();
                salvar();

                // limpar campos
                document.getElementById('campoProduto').value = '';
                document.getElementById('campoLote').value = '';
                document.getElementById('campoNome').value = '';
                document.getElementById('campoDevolucao').value = 'não';

                renderizarTabela();
                document.getElementById('searchInput').value = ''; // reset busca
            }

            function pesquisar(termo) {
                if (!termo) {
                    renderizarTabela(registros);
                    return;
                }
                const t = termo.toLowerCase();
                const filtrados = registros.filter(item => 
                    item.data.includes(t) || 
                    item.produto.toLowerCase().includes(t) || 
                    item.lote.toLowerCase().includes(t) || 
                    item.nome.toLowerCase().includes(t)
                );
                renderizarTabela(filtrados);
            }

            // --- reclamação fake (só feedback) ---
            document.getElementById('btnReclamar')?.addEventListener('click', function() {
                const texto = document.getElementById('reclamacaoText').value.trim();
                const feedback = document.getElementById('feedbackReclamacao');
                if (texto === '') {
                    feedback.innerHTML = '⚠️ Digite sua mensagem.';
                } else {
                    feedback.innerHTML = '✅ Reclamação enviada (simulação). Entraremos em contato.';
                    document.getElementById('reclamacaoText').value = '';
                    setTimeout(() => { feedback.innerHTML = ''; }, 4000);
                }
            });

            // inicialização
            carregarRegistros();
            renderizarTabela();

            // listeners
            document.getElementById('btnAdicionar').addEventListener('click', adicionarRegistro);
            document.getElementById('searchBtn').addEventListener('click', () => {
                const termo = document.getElementById('searchInput').value.trim();
                pesquisar(termo);
            });
            document.getElementById('searchInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    pesquisar(e.target.value.trim());
                }
            });
